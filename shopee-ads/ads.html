<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Win</title>
    <style>
    body {
    font-family: Arial;
    text-align: center;
    background: #f7f7f7;
    margin: 0;
    padding: 20px;
    }

    h1 {
    font-size: 20px;
    margin-top: 20px;
    }

    .wheel {
        width: 180px;
        height: 180px;
        margin: 40px auto;
        border-radius: 50%;
        border: 8px solid #ffcc00;
        position: relative;
        background: conic-gradient(
            #ff9999 0deg 60deg,
            #99ccff 60deg 120deg,
            #99ff99 120deg 180deg,
            #ffcc99 180deg 240deg,
            #ccccff 240deg 300deg,
            #ffcc00 300deg 360deg
        );
        transition: transform 3s ease-out;
    }
    button {
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    }

    #reward {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: green;
    }

    #cta {
    display: none;
    margin-top: 15px;
    padding: 12px 18px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    }

    .xsign{
        display: flex;
        justify-content: flex-end;
    }

    .close-btn {
        /* position: absolute; */
        top: 8px;
        right: 8px;
        border: none;
        background: transparent;
        font-size: 20px;
        cursor: pointer;
        color: #666;
    }

    .close-btn:hover {
        color: #000;
    }

    .label {
    position: absolute;
    font-size: 10px;
    font-weight: bold;
    transform: translate(-50%, -50%);
    }

    /* Posisi masing-masing text */
    .l1 { top: 25%; left: 70%; }
    .l2 { top: 50%; left: 80%; }
    .l3 { top: 75%; left: 70%; }
    .l4 { top: 75%; left: 30%; }
    .l5 { top: 50%; left: 20%; }
    .l6 { top: 25%; left: 30%; }
</style>
</head>

<body>
<div class="container" onclick="ads()">
    <div class="xsign">
        <button class="close-btn" aria-label="Tutup" onclick="ads()">&times;</button>
    </div>
    <h1>Spin Wheel & Dapatkan Hadiah 🎁</h1>
    <h3 style="position: absolute; left: 49%; z-index: 999;">V</h3>
    <div class="wheel" id="wheel">
        <span class="label l1">Diskon<br> Rp10K</span>
        <span class="label l2">Cashback<br> Rp20K</span>
        <span class="label l3">Gratis<br> Ongkir</span>
        <span class="label l4">Cashback<br> Rp30k</span>
        <span class="label l5">Diskon<br> Rp50K</span>
        <span class="label l6">Hadiah<br> Utama</span>
    </div>

    <button onclick="spin()">SPIN NOW</button>

    <div id="reward">🎉 Kamu dapat voucher Shopee diskon!</div>

    <button id="cta" onclick="ads()">Klaim Sekarang</button>
</div>


<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'AW-18222086025');
let spun = false;

function spin() {
    if (spun) return;
    spun = true;

    let wheel = document.getElementById("wheel");

    // random spin angle
    let angle = 1800 + Math.floor(Math.random() * 360);

    wheel.style.transform = "rotate(" + angle + "deg)";

    setTimeout(() => {
    document.getElementById("reward").style.display = "block";
    document.getElementById("cta").style.display = "inline-block";
    }, 3000);
    }

    function ads() {
        gtag('event', 'conversion', {
        'send_to': 'AW-123456789/AbCdEfGhIjK'
        });
        window.location.href = "https://s.shopee.co.id/8ATdcxDLex";
    }
</script>

</body>
</html>
